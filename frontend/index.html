<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPOSTOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="toast-erro" class="toast-erro oculto">
            <span class="icone-alerta">⚠️</span>
            <span id="msg-erro-texto">Por favor, digite seu nome!</span>
        </div>
        <section id="tela-login" class="tela">
            <h1 class="titulo-jogo">IMPOSTOR</h1>
            <div class="card">
                <div class="grupo-input">
                    <label for="nome">Seu Nome</label>
                    <input type="text" id="nome" placeholder="Digite seu apelido..." maxlength="15">
                </div>
                
                <div class="grupo-input">
                    <label for="codigo-sala">Código da Sala</label>
                    <input type="text" id="codigo-sala" placeholder="EX: ABCD" maxlength="4">
                </div>
                <button id="btn-entrar" class="btn btn-secundario">Entrar na Sala</button>

                <div class="divisor"><span>ou</span></div>

                <button id="btn-criar" class="btn btn-primario">Criar Sala</button>
            </div>
        </section>

        <section id="tela-setup" class="tela oculto">
            <div class="header-sala">
                <h2>Sala: <span id="codigo-exibido" class="texto-dourado">----</span></h2>
            </div>
            
            <div class="card">
                <h3>Jogadores Conectados</h3>
                <ul id="lista-jogadores">
                    </ul>
                
                <div id="controles-lider" class="oculto">
                    <div class="grupo-switch" style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="chk-dicas" style="width: 20px; height: 20px; accent-color: #D4AF37;">
                        <label for="chk-dicas" style="color: #E0E0E0; cursor: pointer; font-weight: bold;">Ativar Dicas na Rodada</label>
                    </div>
                    <button id="btn-jogar" class="btn btn-primario">JOGAR</button>
                </div>
                <p id="msg-espera" class="texto-mutado">Aguardando o líder iniciar o jogo...</p>
            </div>
        </section>

        <section id="tela-jogo" class="tela oculto">
            <div class="card card-jogo">
                <h2 id="papel-jogador" class="titulo-papel">INOCENTE</h2>
                
                <div class="conteudo-secreto">
                    <p id="label-revelacao">O local secreto é:</p>
                    <div id="palavra-secreta" class="palavra-destaque">CASA MAL ASSOMBRADA</div>
                </div>
                <div id="container-dica" class="container-dica-moderno oculto">
                    <span>💡 Dica da Rodada:</span>
                    <span id="texto-dica" class="dica-destaque"></span>
                </div>

                <div id="controles-fim-jogo" class="oculto">
                    <button id="btn-voltar" class="btn btn-secundario">Voltar para o Lobby</button>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
